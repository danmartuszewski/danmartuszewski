<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="16" fill="#070a12"/>
  <defs>
    <radialGradient id="sphere-cyan" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#66f0ff"/>
      <stop offset="25%" stop-color="#00e5ff"/>
      <stop offset="75%" stop-color="#005f6b"/>
      <stop offset="100%" stop-color="#002a30"/>
    </radialGradient>
    <radialGradient id="sphere-amber" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffcc66"/>
      <stop offset="25%" stop-color="#ffa000"/>
      <stop offset="75%" stop-color="#6b4500"/>
      <stop offset="100%" stop-color="#302000"/>
    </radialGradient>
    <radialGradient id="sphere-green" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#66ffcc"/>
      <stop offset="25%" stop-color="#00cc88"/>
      <stop offset="75%" stop-color="#005540"/>
      <stop offset="100%" stop-color="#002a20"/>
    </radialGradient>
    <linearGradient id="platform-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#070a12"/>
    </linearGradient>
  </defs>
  <!-- Isometric platform top -->
  <polygon points="64,78 118,100 64,122 10,100" fill="#0e1220" stroke="#1a2540" stroke-width="1"/>
  <!-- Platform sides -->
  <polygon points="10,100 64,122 64,128 10,106" fill="url(#platform-side)" stroke="#1a2540" stroke-width="0.5"/>
  <polygon points="118,100 64,122 64,128 118,106" fill="#0a0e18" stroke="#1a2540" stroke-width="0.5"/>
  <!-- Grid on platform -->
  <line x1="37" y1="89" x2="37" y2="111" stroke="#1a2540" stroke-width="0.3" opacity="0.5"/>
  <line x1="64" y1="78" x2="64" y2="122" stroke="#1a2540" stroke-width="0.3" opacity="0.5"/>
  <line x1="91" y1="89" x2="91" y2="111" stroke="#1a2540" stroke-width="0.3" opacity="0.5"/>
  <!-- Spheres on platform -->
  <circle cx="42" cy="62" r="16" fill="url(#sphere-cyan)"/>
  <circle cx="72" cy="55" r="13" fill="url(#sphere-amber)"/>
  <circle cx="92" cy="70" r="10" fill="url(#sphere-green)"/>
  <!-- Reflections on platform -->
  <ellipse cx="42" cy="95" rx="12" ry="3" fill="#00e5ff" opacity="0.12"/>
  <ellipse cx="72" cy="93" rx="10" ry="2.5" fill="#ffa000" opacity="0.1"/>
  <ellipse cx="92" cy="97" rx="7" ry="2" fill="#00cc88" opacity="0.08"/>
</svg>
